<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PORTFOLIO.SYS // INIT</title>
    <link rel="stylesheet" href="css/main.css">
    <link rel="stylesheet" href="css/crt-effects.css">
    <link rel="stylesheet" href="css/responsive.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=VT323&display=swap" rel="stylesheet">
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
</head>

<body class="crt-overlay cross-bg">
    <div class="screen-curvature">
        <div class="scanlines"></div>

        <div class="top-nav">
            <div class="nav-left">
                <img src="assets/gif/character_placeholder.gif" alt="icon" class="nav-icon"
                    onerror="this.src='data:image/svg+xml,%3Csvg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 20 20%22%3E%3Crect width=%2220%22 height=%2220%22 fill=%22%2355ff55%22/%3E%3C/svg%3E'">
                <span>Silver</span>
            </div>
            <div class="nav-right">
                <a href="#"><img src="https://cdn.jsdelivr.net/npm/simple-icons@v14/icons/simpleicons.svg" class="nav-social-icon social-white" /></a>
                <a href="#"><img src="https://cdn.jsdelivr.net/npm/simple-icons@v14/icons/github.svg" class="nav-social-icon social-white" /></a>
                <a href="#"><img src="https://cdn.jsdelivr.net/npm/simple-icons@v14/icons/x.svg" class="nav-social-icon social-white" /></a>
                <a href="#"><img src="https://cdn.jsdelivr.net/npm/simple-icons@v14/icons/discord.svg" class="nav-social-icon social-white" /></a>
                <span>es v</span>
            </div>
        </div>

        <main class="terminal-container">
            <h1 class="main-title glitch-text" data-text="Silver's Underground">Silver's Underground</h1>

            <div class="divider">
                <span>-----------------</span><span class="diamond">♦</span><span>-----------------</span>
            </div>

            <!-- Header Interaction Box -->
            <div class="hero-box">
                <div class="hero-avatar">
                    <img id="anime-character" src="assets/gif/character_placeholder.gif" alt="Avatar"
                        onerror="this.src='data:image/svg+xml,%3Csvg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 60 60%22%3E%3Crect width=%2260%22 height=%2260%22 fill=%22%23222%22/%3E%3Ctext y=%2240%22 x=%2215%22 font-size=%2230%22 fill=%22%2355ff55%22%3E?%3C/text%3E%3C/svg%3E'">
                </div>
                <div id="dialog-box" class="hero-dialog">
                    <span class="dialog-name">Silver</span>
                    <p id="dialog-text">¡Hola! Soy Silver.</p>
                    <span class="cursor-blink">▶</span>
                </div>
                <div class="hero-levels">
                    <p>◇ ◇ ◇ L1</p>
                    <p>◇ ◇ ◇ L2</p>
                    <p>◇ ◇ ◇ L3</p>
                </div>
            </div>

            <div class="status-bar">
                <span>index.md</span>
                <span class="coords">1,1</span>
                <span>All</span>
            </div>

            <nav class="options-grid">
                <a href="sobre-mi.html" class="grid-btn">
                    <span class="btn-icon"><i data-lucide="user"></i></span>
                    <span class="btn-text">Sobre Mi</span>
                </a>
                <a href="proyectos.html" class="grid-btn">
                    <span class="btn-icon"><i data-lucide="folder-kanban"></i></span>
                    <span class="btn-text">Proyectos</span>
                </a>
                <a href="#" class="grid-btn" onclick="alert('Juegos pronto')">
                    <span class="btn-icon"><i data-lucide="gamepad-2"></i></span>
                    <span class="btn-text">Juegos</span>
                </a>
                <a href="#" class="grid-btn" onclick="alert('Spotify')">
                    <span class="btn-icon"><img src="https://cdn.jsdelivr.net/npm/simple-icons@v14/icons/spotify.svg" class="icon-svg brand-spotify" /></span>
                    <span class="btn-text">Spotify</span>
                </a>
            </nav>
        </main>
    </div>

    <!-- Quick Navigation Menu -->
    <div class="quick-nav-container">
        <div id="fs-menu" class="filesystem-menu hidden">
            <div class="fs-header">Filesystem</div>
            <div class="fs-divider"></div>
            <div class="fs-links">
                <a href="index.html" class="fs-link">
                    <i data-lucide="home"></i> Inicio
                </a>
                <a href="sobre-mi.html" class="fs-link">
                    <i data-lucide="user"></i> Sobre mi
                </a>
                <a href="#" class="fs-link">
                    <img src="https://cdn.jsdelivr.net/npm/simple-icons@v14/icons/spotify.svg" class="icon-svg" /> Música
                </a>
                <a href="#" class="fs-link">
                    <i data-lucide="gamepad-2"></i> Jueguitos
                </a>
                <a href="proyectos.html" class="fs-link">
                    <i data-lucide="folder-kanban"></i> Proyectos
                </a>
                <a href="#" class="fs-link">
                    <i data-lucide="mail"></i> Contacto
                </a>
            </div>
        </div>
        <button class="menu-toggle-btn" id="menu-toggle">
            <span></span>
            <span></span>
            <span></span>
        </button>
    </div>

    <!-- Scripts -->
    <script src="js/config.js"></script>
    <script src="js/glitch.js"></script>
    <script src="js/dialog.js"></script>
    <script src="js/menu.js"></script>
    <script>
      lucide.createIcons();
    </script>
</body>



</html>
