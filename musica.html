<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Musica favoria - Silver Portfolio</title>
    <link rel="stylesheet" href="css/main.css">
    <link rel="stylesheet" href="css/crt-effects.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=VT323&family=Press+Start+2P&display=swap" rel="stylesheet">
</head>

<body class="crt-overlay cross-bg" data-page="music">
    <div class="screen-curvature">
        <div class="scanlines"></div>
        <div class="static-noise"></div>

        <nav class="top-nav">
            <div class="nav-left">
                <img src="assets/gif/ks.gif" alt="icon" class="nav-icon nav-character-icon" onerror="this.src='data:image/svg+xml,%3Csvg xmlns=%22http://www.w3.org/2000/xml%22 viewBox=%220 0 20 20%22%3E%3Crect width=%2220%22 height=%2220%22 fill=%22%2355ff55%22/%3E%3C/svg%3E'">
                <span>Silver</span>
            </div>
            <div class="nav-right">
                <a href="#"><img src="https://cdn.jsdelivr.net/npm/simple-icons@v14/icons/simpleicons.svg" class="nav-social-icon social-white" /></a>
                <a href="#"><img src="https://cdn.jsdelivr.net/npm/simple-icons@v14/icons/github.svg" class="nav-social-icon social-white" /></a>
                <a href="#"><img src="https://cdn.jsdelivr.net/npm/simple-icons@v14/icons/x.svg" class="nav-social-icon social-white" /></a>
                <a href="#"><img src="https://cdn.jsdelivr.net/npm/simple-icons@v14/icons/discord.svg" class="nav-social-icon social-white" /></a>
                <span>es v</span>
            </div>
        </nav>

        <main class="terminal-container">
            <header class="section-header">
                <h1 class="glitch-text" data-text="Musica que adoro">Música que adoro</h1>
                <div class="header-line"></div>
            </header>

            <div class="music-window-container">
                <div class="playlists-header">
                    <span id="playlist-count">Playlists: 0</span>
                    <span class="profile-label">Profile</span>
                </div>

                <div class="music-window">
                    <div class="music-title-bar">
                        <span>~/iPod</span>
                        <div class="window-controls">
                            <span>_</span>
                            <span>□</span>
                            <span>×</span>
                        </div>
                    </div>
                    <div id="playlist-container" class="playlist-list">
                        <!-- Playlists will be injected here -->
                        <div class="loading">Cargando datos de Spotify...</div>
                    </div>
                </div>
            </div>
        </main>

        <!-- Dynamic Content Elements -->
        <div id="nav-character-container"></div>
        
    </div> <!-- End screen-curvature -->

    <!-- Quick Navigation Menu -->
    <div class="quick-nav-container">
        <div id="fs-menu" class="filesystem-menu hidden">
            <div class="fs-header">Filesystem</div>
            <div class="fs-divider"></div>
            <div class="fs-links">
                <a href="index.html" class="fs-link"><i data-lucide="home"></i> Inicio</a>
                <a href="sobre-mi.html" class="fs-link"><i data-lucide="user"></i> Sobre mí</a>
                <a href="proyectos.html" class="fs-link"><i data-lucide="folder-kanban"></i> Proyectos</a>
                <a href="musica.html" class="fs-link active"><i data-lucide="music"></i> Música</a>
                <a href="#" class="fs-link"><i data-lucide="gamepad-2"></i> Jueguitos</a>
                <a href="#" class="fs-link"><i data-lucide="mail"></i> Contacto</a>
            </div>
        </div>
        <button class="menu-toggle-btn" id="menu-toggle">
            <span></span>
            <span></span>
            <span></span>
        </button>
    </div>

    <!-- Scripts -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <script>lucide.createIcons();</script>
    <script src="js/config.js"></script>
    <script src="js/menu.js"></script>
    <script src="js/spotify.js"></script>
</body>

</html>
